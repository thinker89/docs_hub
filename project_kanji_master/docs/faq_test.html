<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #fffbf3;
      color: #111827;
      font-size: 16px;
      line-height: 1.6;
    }

    .doc {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      padding: 16px;
      margin: 0 0 14px;
    }

    .q {
      font-weight: 700;
      margin: 0 0 10px;
    }

    .a {
      color: #374151;
    }
  </style>
</head>
<body>
  <main class="doc">
    <h1>FAQ</h1>

    <div class="card">
      <div class="q">과금했는데 모든 한자를 학습할 수 없어요</div>
      <div class="a">
        결제를 했는데도 모든 한자를 이용할 수 없다면 먼저 앱을 완전히 종료한 뒤 다시 실행해 주세요.<br>
        문제가 계속된다면 [메뉴 → 설정 → 구매 복원]을 눌러 주세요.
      </div>
    </div>

    <div class="card">
      <div class="q">기기를 변경했는데 학습 진도가 초기화 됐어요</div>
      <div class="a">
        이전 기기에서 학습 진도를 저장한 뒤, 새 기기에서 복구하기를 진행해 주세요.
      </div>
    </div>
  </main>
</body>
</html>
